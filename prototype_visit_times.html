<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tofu Team App · Visit times</title>
<style>
  :root {
    --label-primary:   #000000;
    --label-title:     #333333;
    --label-secondary: rgba(60,60,67,.6);
    --label-tertiary:  rgba(60,60,67,.3);
    --surface:         #FFFFFF;
    --surface-ss:      #F5F2EB;
    --surface-done:    #E9F5EE;
    --tofu-dark:       #1F2226;
    --sep:             rgba(60,60,67,.15);
    --green:           #1a7a4a;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #e8e8ed;
    font-family: -apple-system, "SF Pro Text", system-ui, sans-serif;
    display: flex; flex-direction: column; align-items: center;
    padding: 48px 24px 60px; min-height: 100vh;
  }

  /* ── State switcher (prototype control) ── */
  .switch {
    position: fixed; top: 0; left: 0; right: 0; height: 40px;
    background: var(--tofu-dark);
    display: flex; align-items: center; justify-content: center; gap: 0;
    z-index: 9000;
  }
  .sw {
    padding: 0 16px; height: 40px; display: flex; align-items: center;
    font-size: 11px; color: rgba(255,255,255,.45); cursor: pointer;
    user-select: none; white-space: nowrap; transition: color .15s;
  }
  .sw.active { color: #fff; font-weight: 600; }
  .swsep { color: rgba(255,255,255,.18); font-size: 10px; }

  /* ── Phone ── */
  .phone {
    width: 393px; min-height: 852px;
    background: var(--surface); border-radius: 54px; overflow: hidden;
    position: relative;
    box-shadow: 0 0 0 1px rgba(0,0,0,.18), 0 0 0 9px #1a1a1a, 0 0 0 11px #2a2a2a, 0 32px 80px rgba(0,0,0,.38);
  }
  .di {
    position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
    width: 126px; height: 37px; background: #000; border-radius: 20px; z-index: 500;
  }

  .sb {
    height: 59px; display: flex; align-items: flex-end; justify-content: space-between;
    padding: 0 28px 10px; position: relative; z-index: 10;
  }
  .sb-time { font-size: 17px; font-weight: 590; color: var(--label-primary); letter-spacing: -.3px; }

  .screen { display: none; flex-direction: column; min-height: 852px; }
  .screen.active { display: flex; }

  .content { flex: 1; overflow-y: auto; padding-bottom: 40px; -webkit-overflow-scrolling: touch; }
  .content::-webkit-scrollbar { display: none; }

  /* ── Visit detail ── */
  .d-round-btn {
    width: 44px; height: 44px; border-radius: 50%;
    background: #fff; border: 0.5px solid rgba(60,60,67,.2);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,.06); flex-shrink: 0;
  }
  .d-round-btn:active { background: #f5f5f5; }
  .d-head { padding: 8px 20px 0; }
  .d-title { font-size: 40px; font-weight: 800; color: var(--label-primary); letter-spacing: -1px; line-height: 1.05; margin-top: 18px; word-break: break-word; }
  .d-status {
    display: inline-flex; align-items: center; gap: 7px; margin-top: 14px;
    font-size: 22px; font-weight: 700; color: var(--label-primary); letter-spacing: -.3px;
  }
  .d-status .dot-done { width: 9px; height: 9px; border-radius: 50%; background: var(--green); }

  /* Time block: just Start → Finish. Quiet. */
  .d-time {
    margin: 20px 20px 0; padding: 18px 18px; border-radius: 16px;
    background: var(--surface-ss);
  }
  .tl-row { display: flex; align-items: center; gap: 14px; }
  .tl-marker { display: flex; flex-direction: column; align-items: center; width: 13px; flex-shrink: 0; }
  .tl-dot { width: 11px; height: 11px; border-radius: 50%; border: 2px solid var(--label-tertiary); background: #fff; }
  .tl-dot.filled { background: var(--label-tertiary); }
  .tl-line { width: 2px; height: 20px; background: var(--label-tertiary); opacity: .5; }
  .tl-body { flex: 1; display: flex; justify-content: space-between; align-items: baseline; }
  .tl-lbl { font-size: 15px; color: var(--label-secondary); }
  .tl-time { font-size: 15px; font-weight: 500; color: var(--label-primary); }

  /* Info cards: plain text rows, no emoji */
  .d-card {
    margin: 12px 20px 0; padding: 16px 18px; border-radius: 16px;
    background: #fff; border: 0.5px solid rgba(60,60,67,.18);
    display: flex; align-items: center; gap: 14px; cursor: pointer;
  }
  .d-card:active { background: #fafafa; }
  .d-card-body { flex: 1; min-width: 0; }
  .d-card-title { font-size: 17px; font-weight: 700; color: var(--label-primary); }
  .d-card-sub { font-size: 14px; color: var(--label-secondary); margin-top: 2px; }
  .d-card-chev { color: var(--label-tertiary); font-size: 18px; flex-shrink: 0; }

  /* Empty state: invitation to add, not "Not provided" */
  .d-card.add { border-style: dashed; border-color: rgba(60,60,67,.28); background: transparent; }
  .d-card.add .d-card-title { color: var(--label-secondary); font-weight: 600; }
  .d-card-plus { color: var(--label-tertiary); font-size: 20px; font-weight: 400; flex-shrink: 0; }

  .gap { height: 28px; }
</style>
</head>
<body>

<!-- State switcher: two visit states in this release -->
<div class="switch">
  <div class="sw active" data-s="filled">Visit with data</div>
  <div class="swsep">·</div>
  <div class="sw" data-s="empty">Visit with empty states</div>
</div>

<div class="phone">
  <div class="di"></div>

  <!-- ══ VISIT: filled ══ -->
  <div class="screen active" id="s-filled">
    <div class="sb"><span class="sb-time">12:41</span><div><svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x=".5" y=".5" width="21" height="11" rx="3.5" stroke="currentColor" stroke-opacity=".35"/><rect x="1.5" y="1.5" width="17" height="9" rx="2.5" fill="currentColor"/><path d="M23 4v4a2 2 0 000-4z" fill="currentColor" fill-opacity=".4"/></svg></div></div>
    <div class="content">
      <div class="d-head">
        <div style="display:flex;align-items:center;justify-content:space-between;">
          <button class="d-round-btn">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 2L4 8l6 6" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <button class="d-round-btn">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor"><circle cx="4" cy="10" r="1.6"/><circle cx="10" cy="10" r="1.6"/><circle cx="16" cy="10" r="1.6"/></svg>
          </button>
        </div>
        <div class="d-title">Emily Taylor</div>
        <div class="d-status"><span class="dot-done"></span>Completed</div>
      </div>

      <!-- Start → Finish, quiet. Duration is NOT here (lives in My Hours next iteration). -->
      <div class="d-time">
        <div class="tl-row">
          <div class="tl-marker"><div class="tl-dot"></div><div class="tl-line"></div></div>
          <div class="tl-body"><span class="tl-lbl">Start</span><span class="tl-time">8:04 AM</span></div>
        </div>
        <div class="tl-row">
          <div class="tl-marker"><div class="tl-dot filled"></div></div>
          <div class="tl-body"><span class="tl-lbl">Finish</span><span class="tl-time">8:56 AM</span></div>
        </div>
      </div>

      <div class="d-card">
        <div class="d-card-body">
          <div class="d-card-title">Photos</div>
          <div class="d-card-sub">2 added · 1 before · 1 after</div>
        </div>
        <div class="d-card-chev">›</div>
      </div>

      <div class="d-card">
        <div class="d-card-body">
          <div class="d-card-title">Notes</div>
          <div class="d-card-sub">Gate code 1247. Dog inside.</div>
        </div>
        <div class="d-card-chev">›</div>
      </div>

      <div class="d-card">
        <div class="d-card-body">
          <div class="d-card-title">Address</div>
          <div class="d-card-sub">742 Oak St, Brooklyn, NY</div>
        </div>
        <div class="d-card-chev">›</div>
      </div>

      <div class="gap"></div>
    </div>
  </div>

  <!-- ══ VISIT: empty states ══ -->
  <div class="screen" id="s-empty">
    <div class="sb"><span class="sb-time">12:41</span><div><svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x=".5" y=".5" width="21" height="11" rx="3.5" stroke="currentColor" stroke-opacity=".35"/><rect x="1.5" y="1.5" width="17" height="9" rx="2.5" fill="currentColor"/><path d="M23 4v4a2 2 0 000-4z" fill="currentColor" fill-opacity=".4"/></svg></div></div>
    <div class="content">
      <div class="d-head">
        <div style="display:flex;align-items:center;justify-content:space-between;">
          <button class="d-round-btn">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 2L4 8l6 6" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <button class="d-round-btn">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor"><circle cx="4" cy="10" r="1.6"/><circle cx="10" cy="10" r="1.6"/><circle cx="16" cy="10" r="1.6"/></svg>
          </button>
        </div>
        <div class="d-title">Carmen Flores</div>
        <div class="d-status"><span class="dot-done"></span>Completed</div>
      </div>

      <!-- Start → Finish always present (from the taps) -->
      <div class="d-time">
        <div class="tl-row">
          <div class="tl-marker"><div class="tl-dot"></div><div class="tl-line"></div></div>
          <div class="tl-body"><span class="tl-lbl">Start</span><span class="tl-time">10:33 AM</span></div>
        </div>
        <div class="tl-row">
          <div class="tl-marker"><div class="tl-dot filled"></div></div>
          <div class="tl-body"><span class="tl-lbl">Finish</span><span class="tl-time">11:41 AM</span></div>
        </div>
      </div>

      <!-- Photos empty → invitation, not "Not provided" -->
      <div class="d-card add">
        <div class="d-card-body"><div class="d-card-title">Add photos</div></div>
        <div class="d-card-plus">+</div>
      </div>

      <!-- Notes empty → invitation -->
      <div class="d-card add">
        <div class="d-card-body"><div class="d-card-title">Add a note</div></div>
        <div class="d-card-plus">+</div>
      </div>

      <!-- Address not set by worker → hidden entirely -->

      <div class="gap"></div>
    </div>
  </div>

</div><!-- /phone -->

<script>
  function show(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('s-' + id).classList.add('active');
    document.querySelectorAll('.sw').forEach(w => w.classList.toggle('active', w.getAttribute('data-s') === id));
  }
  document.querySelectorAll('.sw').forEach(w => w.addEventListener('click', () => show(w.getAttribute('data-s'))));
</script>
</body>
</html>
